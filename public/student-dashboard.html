<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <title>Student Dashboard – Skillset Tech Institute</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-top: 100px;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 0 1.5rem; }
    .profile-card {
      background: var(--surface);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      text-align: center;
      margin-bottom: 2rem;
      box-shadow: var(--shadow-lg);
    }
    .profile-card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid var(--neon);
      box-shadow: 0 0 20px var(--neon-glow);
      margin-bottom: 1rem;
    }
    .course-list {
      list-style: none;
      padding: 0;
    }
    .course-list li {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(12px);
    }
    .status-badge {
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .status-pending { background: #F59E0B; color: #000; }
    .status-reviewed { background: #3B82F6; color: #fff; }
    .status-approved { background: #10B981; color: #fff; }

    .logout-btn {
      display: inline-block;
      padding: 0.7rem 2rem;
      border-radius: 50px;
      background: #EF4444;
      color: #fff;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 2rem;
    }
    .logout-btn:hover { background: #DC2626; }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile-card">
      <img id="profilePic" src="https://ui-avatars.com/api/?name=Student&background=00FFFF&color=0A0F1F&size=200" alt="Profile">
      <h2 id="studentName" style="color:var(--heading);">Welcome!</h2>
      <p id="studentEmail" style="color:var(--text-dim);"></p>
    </div>

    <h3 style="color:var(--heading); margin-bottom:1rem;">📚 My Enrollments</h3>
    <ul class="course-list" id="courseList">
      <li style="color:var(--text-dim);">Loading courses...</li>
    </ul>

    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    // Redirect to login if not authenticated
    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      // Display user info
      document.getElementById('studentName').textContent = user.displayName || 'Student';
      document.getElementById('studentEmail').textContent = user.email;

      // Fetch enrollments from backend
      const token = await user.getIdToken();
      try {
        const res = await fetch('/api/student/profile', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();

        const courseList = document.getElementById('courseList');
        courseList.innerHTML = (data.enrollments || []).length > 0
          ? data.enrollments.map(c => `
              <li>
                <span>${c.courseTitle}</span>
                <span class="status-badge status-${c.status || 'pending'}">${c.status || 'pending'}</span>
              </li>
            `).join('')
          : '<li style="color:var(--text-dim);">No enrollments yet. <a href="admissions.html" style="color:var(--neon);">Register for a course</a></li>';
      } catch (err) {
        document.getElementById('courseList').innerHTML = '<li style="color:red;">Failed to load courses.</li>';
      }
    });

    function logout() {
      auth.signOut().then(() => {
        window.location.href = 'login.html';
      });
    }
  </script>
</body>
</html>
