<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <title>Create Account – Skillset Tech Institute</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .auth-card {
      background: var(--surface);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    .logo-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    h2 { font-weight: 800; font-size: 1.5rem; color: var(--heading); margin-bottom: 0.3rem; }
    .subtitle { color: var(--text-dim); margin-bottom: 1.8rem; font-size: 0.9rem; }

    .form-group { margin-bottom: 1.1rem; text-align: left; }
    .form-group label {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 5px; color: var(--neon); font-weight: 600; font-size: 0.85rem;
    }
    .form-group input, .form-group select {
      width: 100%; padding: 12px 14px;
      background: var(--bg); border: 2px solid var(--border);
      border-radius: 12px; color: var(--text); font-family: inherit; font-size: 0.95rem;
      transition: border 0.2s, box-shadow 0.2s; outline: none;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--neon);
      box-shadow: 0 0 0 3px rgba(0,255,255,0.1);
    }
    select option { background: var(--bg); color: var(--text); }

    .btn-neon {
      width: 100%; padding: 14px; border-radius: 50px;
      font-weight: 600; font-size: 1rem;
      background: var(--neon); color: var(--neon-dark-text);
      border: none; cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px var(--neon-glow);
      letter-spacing: 0.3px;
      margin-top: 0.8rem;
    }
    .btn-neon:hover { background: var(--neon-hover); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,255,255,0.5); }
    .btn-neon:disabled { opacity: 0.6; cursor: not-allowed; }

    .auth-link { margin-top: 1.5rem; color: var(--text-dim); font-size: 0.9rem; }
    .auth-link a { color: var(--neon); text-decoration: none; font-weight: 600; }
    .auth-link a:hover { text-decoration: underline; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="logo-icon">🚀</div>
    <h2>Create Your Account</h2>
    <p class="subtitle">Sign up and enroll in a course instantly</p>

    <form id="signupForm">
      <div class="form-group">
        <label><i class="fas fa-user"></i> Full Name</label>
        <input type="text" id="fullName" placeholder="Enter your full name" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" minlength="6" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-book"></i> Select Course</label>
        <select id="course" required>
          <option value="">-- Choose Your Course --</option>
          <option>CCC - Computer Concepts</option>
          <option>Tally Prime with GST</option>
          <option>DTP - Desktop Publishing</option>
          <option>DTE - Data Entry & Typing</option>
          <option>Web Development (MERN Stack)</option>
          <option>Digital Marketing</option>
          <option>Data Analyst (Coming Soon)</option>
          <option>DSA (Coming Soon)</option>
          <option>C++ Programming (Coming Soon)</option>
          <option>Python Programming (Coming Soon)</option>
        </select>
      </div>
      <button type="submit" class="btn-neon" id="signupBtn">
        <span id="signupText">Create Account & Enroll</span>
        <span id="signupLoader" class="hidden"><i class="fas fa-spinner fa-spin"></i> Creating...</span>
      </button>
    </form>
    <p class="auth-link">Already have an account? <a href="login.html">Sign in</a></p>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    // Redirect if already logged in
    auth.onAuthStateChanged(user => {
      if (user) window.location.href = 'student-dashboard.html';
    });

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const course = document.getElementById('course').value;

      if (!fullName || !email || !password || !course) {
        alert('⚠️ Please fill all fields');
        return;
      }
      if (password.length < 6) {
        alert('⚠️ Password must be at least 6 characters');
        return;
      }

      document.getElementById('signupText').classList.add('hidden');
      document.getElementById('signupLoader').classList.remove('hidden');
      document.getElementById('signupBtn').disabled = true;

      try {
        // Create Firebase account (auto‑login)
        const userCred = await auth.createUserWithEmailAndPassword(email, password);
        await userCred.user.updateProfile({ displayName: fullName });
        const token = await userCred.user.getIdToken();

        // Save to backend
        await fetch('/api/admissions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            fullName, email, course,
            uid: userCred.user.uid,
            status: 'pending'
          })
        });

        // Success – go to dashboard (already logged in)
        window.location.href = 'student-dashboard.html';
      } catch (err) {
        if (err.code === 'auth/email-already-in-use') {
          alert('⚠️ This email is already registered. Please login instead.');
        } else {
          alert('❌ ' + err.message);
        }
        document.getElementById('signupText').classList.remove('hidden');
        document.getElementById('signupLoader').classList.add('hidden');
        document.getElementById('signupBtn').disabled = false;
      }
    });
  </script>
</body>
</html>
