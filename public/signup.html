<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account – Skillset</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .auth-card { background:var(--surface); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:24px; padding:2.5rem 2rem; max-width:420px; width:100%; text-align:center; }
    .auth-card h2 { font-family:'Montserrat',sans-serif; font-size:1.8rem; margin-bottom:0.5rem; }
    .auth-card p { color:var(--text-dim); margin-bottom:1.5rem; font-size:0.9rem; }
    .form-group { margin-bottom:1rem; text-align:left; }
    .form-group label { display:block; margin-bottom:4px; color:var(--secondary); font-weight:500; font-size:0.9rem; }
    .form-group input { width:100%; padding:14px; background:var(--bg); border:1px solid var(--border); border-radius:12px; color:var(--text); font-family:inherit; font-size:1rem; }
    .auth-btn { width:100%; padding:14px; border-radius:50px; background:linear-gradient(135deg,var(--primary),#c0266b); color:white; font-weight:600; font-size:1.05rem; border:none; cursor:pointer; margin-top:0.5rem; }
    .auth-link { margin-top:1.2rem; color:var(--text-dim); font-size:0.9rem; }
    .auth-link a { color:var(--secondary); text-decoration:none; font-weight:600; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h2>Create Account 🎓</h2>
      <p>Join Student Skillset today</p>
      
      <form id="signupForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
        </div>
        <button type="submit" class="auth-btn">
          <span id="signupText">Create Account</span>
          <span id="signupLoader" style="display:none;"><i class="fas fa-spinner fa-spin"></i></span>
        </button>
      </form>

      <p class="auth-link">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script>
   const firebaseConfig = {
  apiKey: "AIzaSyAsKJHRE1kzAdlVBXhRxcZF3yXAbdHRCrc",
  authDomain: "wallpaperfeed-577a7.firebaseapp.com",
  databaseURL: "https://wallpaperfeed-577a7-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "wallpaperfeed-577a7",
  storageBucket: "wallpaperfeed-577a7.firebasestorage.app",
  messagingSenderId: "560156190506",
  appId: "1:560156190506:web:cbc8482e912b05805ee053",
  measurementId: "G-H8K993NRGN"
};
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      document.getElementById('signupText').style.display = 'none';
      document.getElementById('signupLoader').style.display = 'inline';

      try {
        const userCred = await auth.createUserWithEmailAndPassword(email, password);
        await userCred.user.updateProfile({ displayName: name });
        window.location.href = 'student-dashboard.html';
      } catch (err) {
        alert(err.message);
        document.getElementById('signupText').style.display = 'inline';
        document.getElementById('signupLoader').style.display = 'none';
      }
    });
  </script>
</body>
</html>
