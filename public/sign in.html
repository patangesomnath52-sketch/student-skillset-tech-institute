<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root { --primary: #6c5ce7; --bg: #0a0a1a; --glass-bg: rgba(255,255,255,0.08); }
    body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0c0c1d, #1a1a3e); color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .container { background: var(--glass-bg); backdrop-filter: blur(20px); padding: 2rem; border-radius: 20px; width: 350px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
    input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: white; box-sizing: border-box; }
    button { background: var(--primary); color: white; padding: 12px; width: 100%; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    #googleBtn { background: #db4437; margin-top: 15px; }
    #errorMsg { color: #ff7675; margin-top: 10px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Student Portal</h2>
    <input type="email" id="email" placeholder="Student Email" autocomplete="email">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    <button id="signInBtn">Student Login</button>
    <button id="googleBtn"><i class="fab fa-google"></i> Login with Google</button>
    <p id="errorMsg"></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAsKJHRE1kzAdlVBXhRxcZF3yXAbdHRCrc",
    authDomain: "wallpaperfeed-577a7.firebaseapp.com",
    databaseURL: "https://wallpaperfeed-577a7-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "wallpaperfeed-577a7",
    storageBucket: "wallpaperfeed-577a7.firebasestorage.app",
    messagingSenderId: "560156190506",
    appId: "1:560156190506:web:cbc8482e912b05805ee053",
    measurementId: "G-H8K993NRGN"
  };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Email/Password Logic
    document.getElementById('signInBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
        // Admin vs Student routing
        window.location.href = email === "admin@skillset.com" ? '/admin.html' : '/dashboard.html';
      } catch (err) {
        document.getElementById('errorMsg').textContent = "Invalid credentials";
      }
    });

    // Google Logic
    document.getElementById('googleBtn').addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, provider);
        window.location.href = '/dashboard.html';
      } catch (err) {
        document.getElementById('errorMsg').textContent = "Google Sign-In failed.";
      }
    });
  </script>
</body>
</html>
