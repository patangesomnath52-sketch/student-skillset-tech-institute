<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery – Student Skillset Tech Institute</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --primary:#6c5ce7; --primary-light:#a29bfe; --secondary:#00cec9; --accent:#fd79a8;
      --dark:#2d3436; --light:#f8f9fa; --glass-bg:rgba(255,255,255,0.15); --glass-border:rgba(255,255,255,0.3);
      --shadow:0 20px 40px rgba(0,0,0,0.15); --transition:all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1.2); --radius:20px; --radius-sm:12px;
    }
    body { font-family:'Poppins',sans-serif; background:linear-gradient(135deg,#0c0c1d 0%,#1a1a3e 100%); color:#fff; overflow-x:hidden; line-height:1.6; }
    .container { max-width:1300px; margin:0 auto; padding:0 20px; }
    nav { position:fixed; top:20px; left:50%; transform:translateX(-50%); width:90%; max-width:1200px; z-index:1000; background:rgba(20,20,40,0.7); backdrop-filter:blur(20px); border-radius:60px; padding:0.8rem 2rem; display:flex; align-items:center; justify-content:space-between; border:1px solid rgba(255,255,255,0.2); transition:0.4s; }
    nav.scrolled { background:rgba(15,15,30,0.85); box-shadow:0 10px 30px rgba(0,0,0,0.5); }
    .logo { font-family:'Montserrat',sans-serif; font-weight:900; font-size:1.5rem; background:linear-gradient(to right,#a29bfe,#00cec9); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
    .nav-links { display:flex; list-style:none; gap:1.5rem; align-items:center; }
    .nav-links a { color:white; text-decoration:none; font-weight:500; transition:0.3s; font-size:0.9rem; }
    .nav-links a:hover { color:var(--secondary); }
    .dropdown { position:relative; }
    .dropdown-toggle::after { content:" ▾"; }
    .dropdown-menu { position:absolute; top:100%; left:0; background:rgba(20,20,40,0.9); backdrop-filter:blur(20px); border-radius:16px; padding:0.8rem 0; min-width:220px; display:none; flex-direction:column; border:1px solid rgba(255,255,255,0.2); margin-top:10px; z-index:1001; }
    .dropdown:hover .dropdown-menu { display:flex; }
    .dropdown-menu a { padding:0.6rem 1.5rem; font-size:0.85rem; }
    .dropdown-menu a:hover { background:rgba(255,255,255,0.1); }
    .btn { background:linear-gradient(45deg,var(--primary),#a29bfe); border:none; padding:0.7rem 1.8rem; border-radius:50px; color:white; font-weight:600; cursor:pointer; transition:var(--transition); text-decoration:none; display:inline-block; }
    .btn:hover { transform:translateY(-3px); box-shadow:0 10px 25px rgba(108,92,231,0.6); }
    .btn-outline { background:transparent; border:2px solid white; }
    .btn-outline:hover { background:white; color:#1a1a3e; }
    .filter-bar { display:flex; gap:0.8rem; flex-wrap:wrap; margin:2rem 0; }
    .filter-btn { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; padding:0.5rem 1.5rem; border-radius:50px; cursor:pointer; transition:0.3s; font-size:0.9rem; }
    .filter-btn.active, .filter-btn:hover { background:var(--primary); border-color:var(--primary); }
    .masonry { column-count:3; column-gap:1.5rem; margin-top:1rem; }
    .masonry-item { break-inside:avoid; margin-bottom:1.5rem; border-radius:var(--radius); overflow:hidden; background:rgba(255,255,255,0.05); transition:0.3s; }
    .masonry-item img { width:100%; display:block; transition:0.4s; }
    .masonry-item:hover img { transform:scale(1.05); }
    @media(max-width:768px) { .masonry { column-count:2; } }
    @media(max-width:500px) { .masonry { column-count:1; } }
    footer { background:rgba(10,10,25,0.8); backdrop-filter:blur(15px); padding:3rem 2rem; margin-top:4rem; border-top:1px solid rgba(255,255,255,0.1); }
    .whatsapp-float { position:fixed; bottom:30px; right:30px; background:#25D366; color:white; width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2rem; box-shadow:0 10px 25px rgba(37,211,102,0.4); z-index:999; animation:pulse 2s infinite; }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(37,211,102,0.7)} 70%{box-shadow:0 0 0 20px rgba(37,211,102,0)} 100%{box-shadow:0 0 0 0 rgba(37,211,102,0)} }
    .whatsapp-float:hover { transform:scale(1.1); }
    .page-content { padding-top:120px; min-height:80vh; }
  </style>
</head>
<body>
  <nav id="navbar">
    <a href="index.html" class="logo">SKILLSET</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li class="dropdown">
        <a href="courses.html" class="dropdown-toggle">Courses</a>
        <div class="dropdown-menu"><a href="courses.html">All Courses</a></div>
      </li>
      <li><a href="placements.html">Placements</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="admissions.html">Admissions</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="#" id="studentLoginBtn" class="btn btn-outline" style="padding:0.4rem 1.2rem;">Student Login</a></li>
      <li><a href="admissions.html" class="btn">Apply Now</a></li>
    </ul>
  </nav>

  <div class="page-content container">
    <h1>Gallery</h1>
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="classroom">Classroom</button>
      <button class="filter-btn" data-filter="lab">Lab</button>
      <button class="filter-btn" data-filter="students">Students</button>
      <button class="filter-btn" data-filter="workshops">Workshops</button>
      <button class="filter-btn" data-filter="certificates">Certificates</button>
      <button class="filter-btn" data-filter="events">Events</button>
    </div>

    <div class="masonry" id="galleryGrid">
      <!-- Items with data-category; using picsum random images -->
      <div class="masonry-item" data-category="classroom"><img src="class.jpeg" alt="Classroom"></div>
      <div class="masonry-item" data-category="classroom"><img src="room.jpeg" alt="Classroom"></div>
  </div>

  <a href="https://wa.me/919876543210" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

  <footer>
    <div class="container" style="display:flex; justify-content:space-between; flex-wrap:wrap;">
      <div><h4>Student Skillset</h4><p>Practical Computer Education</p></div>
      <div><h4>Quick Links</h4><a href="index.html" style="color:white;">Home</a> | <a href="courses.html" style="color:white;">Courses</a> | <a href="admissions.html" style="color:white;">Admissions</a></div>
      <div><h4>Follow Us</h4><i class="fab fa-instagram fa-2x" style="margin:0 5px;"></i><i class="fab fa-facebook fa-2x" style="margin:0 5px;"></i><i class="fab fa-youtube fa-2x" style="margin:0 5px;"></i></div>
    </div>
  </footer>

  <script>
    window.addEventListener('scroll', () => document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50));
    // Student login modal (simplified)
    document.getElementById('studentLoginBtn').addEventListener('click', (e) => { e.preventDefault(); alert('Student Zone (demo)'); });

    // Gallery filter
    const filterBtns = document.querySelectorAll('.filter-btn');
    const items = document.querySelectorAll('.masonry-item');
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        items.forEach(item => {
          if (filter === 'all' || item.dataset.category === filter) {
            item.style.display = 'block';
          } else {
            item.style.display = 'none';
          }
        });
      });
    });
  </script>
</body>
</html>
