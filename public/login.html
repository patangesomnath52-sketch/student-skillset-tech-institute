<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login – Skillset</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .auth-card h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }
    .auth-card p { color: var(--text-dim); margin-bottom: 1.5rem; font-size: 0.9rem; }
    .form-group { margin-bottom: 1rem; text-align: left; }
    .form-group label { display: block; margin-bottom: 4px; color: var(--secondary); font-weight: 500; font-size: 0.9rem; }
    .form-group input {
      width: 100%; padding: 14px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); font-family: inherit; font-size: 1rem;
    }
    .auth-btn {
      width: 100%; padding: 14px; border-radius: 50px;
      background: linear-gradient(135deg, var(--primary), #c0266b);
      color: white; font-weight: 600; font-size: 1.05rem;
      border: none; cursor: pointer; margin-top: 0.5rem;
    }
    .auth-link { margin-top: 1.2rem; color: var(--text-dim); font-size: 0.9rem; }
    .auth-link a { color: var(--secondary); text-decoration: none; font-weight: 600; }
    .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: var(--text-dim); font-size: 0.85rem; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .social-btn {
      width: 100%; padding: 12px; border-radius: 50px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); cursor: pointer; font-size: 0.95rem;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 0.8rem; transition: 0.2s;
    }
    .social-btn:hover { border-color: var(--secondary); }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h2>Welcome Back 👋</h2>
      <p>Sign in to your student account</p>
      
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <p style="text-align:right; margin-bottom:0.5rem;">
          <a href="#" id="forgotPassword" style="color:var(--secondary); font-size:0.85rem; text-decoration:none;">Forgot password?</a>
        </p>
        <button type="submit" class="auth-btn" id="loginBtn">
          <span id="loginText">Sign In</span>
          <span id="loginLoader" style="display:none;"><i class="fas fa-spinner fa-spin"></i> Please wait...</span>
        </button>
      </form>

      <p class="auth-link">Don't have an account? <a href="signup.html">Create one</a></p>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script>
    // 🔥 REPLACE WITH YOUR FIREBASE CONFIG
   const firebaseConfig = {
  apiKey: "AIzaSyAsKJHRE1kzAdlVBXhRxcZF3yXAbdHRCrc",
  authDomain: "wallpaperfeed-577a7.firebaseapp.com",
  databaseURL: "https://wallpaperfeed-577a7-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "wallpaperfeed-577a7",
  storageBucket: "wallpaperfeed-577a7.firebasestorage.app",
  messagingSenderId: "560156190506",
  appId: "1:560156190506:web:cbc8482e912b05805ee053",
  measurementId: "G-H8K993NRGN"
};
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Check if already logged in
    auth.onAuthStateChanged(user => {
      if (user) window.location.href = 'student-dashboard.html';
    });

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      document.getElementById('loginText').style.display = 'none';
      document.getElementById('loginLoader').style.display = 'inline';
      
      try {
        await auth.signInWithEmailAndPassword(email, password);
        window.location.href = 'student-dashboard.html';
      } catch (err) {
        alert(err.message);
        document.getElementById('loginText').style.display = 'inline';
        document.getElementById('loginLoader').style.display = 'none';
      }
    });

    // Forgot password
    document.getElementById('forgotPassword').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value || prompt('Enter your email:');
      if (email) {
        try {
          await auth.sendPasswordResetEmail(email);
          alert('✅ Password reset email sent!');
        } catch (err) {
          alert(err.message);
        }
      }
    });
  </script>
</body>
</html>
