<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <title>Student Login – Skillset Tech Institute</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .auth-card {
      background: var(--surface);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    .logo-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    h2 { font-weight: 800; font-size: 1.5rem; color: var(--heading); margin-bottom: 0.3rem; }
    .subtitle { color: var(--text-dim); margin-bottom: 1.8rem; font-size: 0.9rem; }
    .form-group { margin-bottom: 1.1rem; text-align: left; }
    .form-group label {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 5px; color: var(--neon); font-weight: 600; font-size: 0.85rem;
    }
    .form-group input {
      width: 100%; padding: 12px 14px;
      background: var(--bg); border: 2px solid var(--border);
      border-radius: 12px; color: var(--text); font-family: inherit; font-size: 0.95rem;
      transition: border 0.2s, box-shadow 0.2s; outline: none;
    }
    .form-group input:focus {
      border-color: var(--neon);
      box-shadow: 0 0 0 3px rgba(0,255,255,0.1);
    }
    .btn-neon {
      width: 100%; padding: 14px; border-radius: 50px;
      font-weight: 600; font-size: 1rem;
      background: var(--neon); color: var(--neon-dark-text);
      border: none; cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px var(--neon-glow);
      letter-spacing: 0.3px;
      margin-top: 0.5rem;
    }
    .btn-neon:hover { background: var(--neon-hover); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,255,255,0.5); }
    .btn-neon:disabled { opacity: 0.6; cursor: not-allowed; }
    .divider {
      display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0;
      color: var(--text-dim); font-size: 0.85rem;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .google-btn {
      width: 100%; padding: 14px; border-radius: 50px;
      border: 2px solid var(--border); background: transparent;
      color: var(--text); cursor: pointer; font-weight: 500; font-size: 1rem;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.3s; margin-bottom: 1.5rem;
    }
    .google-btn:hover { background: var(--surface-hover); border-color: var(--neon); color: var(--neon); }
    .error-msg { color: #EF4444; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    .auth-link { margin-top: 1.5rem; color: var(--text-dim); font-size: 0.9rem; }
    .auth-link a { color: var(--neon); text-decoration: none; font-weight: 600; }
    .auth-link a:hover { text-decoration: underline; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="logo-icon">🎓</div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Log in to your student account</p>

    <button class="google-btn" onclick="signInWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="divider">or sign in with email</div>

    <form id="loginForm">
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <p class="error-msg" id="loginError">Invalid email or password</p>
      <button type="submit" class="btn-neon" id="loginBtn">
        <span id="loginText">Sign In</span>
        <span id="loginLoader" class="hidden"><i class="fas fa-spinner fa-spin"></i> Signing in...</span>
      </button>
    </form>

    <p style="text-align:right; margin:0.8rem 0 0;">
      <a href="#" id="forgotPassword" style="color:var(--neon); font-size:0.85rem; text-decoration:none;">Forgot password?</a>
    </p>
    <p class="auth-link">Don't have an account? <a href="registrations.html">Create one</a></p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAsKJHRE1kzAdlVBXhRxcZF3yXAbdHRCrc",
      authDomain: "wallpaperfeed-577a7.firebaseapp.com",
      databaseURL: "https://wallpaperfeed-577a7-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "wallpaperfeed-577a7",
      storageBucket: "wallpaperfeed-577a7.firebasestorage.app",
      messagingSenderId: "560156190506",
      appId: "1:560156190506:web:cbc8482e912b05805ee053",
      measurementId: "G-H8K993NRGN"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function signInWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then(() => window.location.href = 'student-dashboard.html')
        .catch(err => alert('Google Sign-In failed: ' + err.message));
    }

    auth.onAuthStateChanged(user => { if (user) window.location.href = 'student-dashboard.html'; });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      document.getElementById('loginText').classList.add('hidden');
      document.getElementById('loginLoader').classList.remove('hidden');
      document.getElementById('loginError').style.display = 'none';
      try {
        await auth.signInWithEmailAndPassword(email, password);
        window.location.href = 'student-dashboard.html';
      } catch (err) {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginError').textContent = err.message;
        document.getElementById('loginText').classList.remove('hidden');
        document.getElementById('loginLoader').classList.add('hidden');
      }
    });

    document.getElementById('forgotPassword').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value || prompt('Enter your email:');
      if (email) {
        try {
          await auth.sendPasswordResetEmail(email);
          alert('✅ Password reset email sent!');
        } catch (err) { alert('Error: ' + err.message); }
      }
    });
  </script>
</body>
</html>
