<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #0a0a1a; color: white; padding: 2rem; }
    .status-card { background: rgba(255,255,255,0.1); padding: 2rem; border-radius: 20px; max-width: 500px; margin: auto; }
  </style>
</head>
<body>
  <div class="status-card">
    <h1>Your Application</h1>
    <div id="statusContent">Loading your application status...</div>
  </div>
<button class="theme-toggle" aria-label="Toggle dark/light mode">
    <i id="themeIcon" class="fas fa-moon"></i>
</button>
  <script type="module">
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    const auth = getAuth();

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // Fetch student data by email
        const res = await fetch(`/api/admissions/student?email=${user.email}`);
        const data = await res.json();
        
        if (data) {
          document.getElementById('statusContent').innerHTML = `
            <p><strong>Name:</strong> ${data.fullName}</p>
            <p><strong>Course:</strong> ${data.course}</p>
            <p><strong>Status:</strong> ${data.status || 'Pending'}</p>
          `;
        } else {
          document.getElementById('statusContent').textContent = "No application found.";
        }
      } else {
        window.location.href = '/signin.html';
      }
    });
  </script>
  <script src="js/main.js"></script>
</body>
</html>
